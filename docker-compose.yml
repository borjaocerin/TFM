services:
  api:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    container_name: tfm_laliga_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-dev}
      - TZ=${TZ:-Europe/Madrid}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATA_DIR=${DATA_DIR:-/app/data}
      - OUTPUT_DIR=${OUTPUT_DIR:-/app/data/out}
      - MODEL_DIR=${MODEL_DIR:-/app/backend/app/models/store}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - FIXTURES_API_URL=${FIXTURES_API_URL:-}
      - FIXTURES_API_KEY=${FIXTURES_API_KEY:-}
      - FIXTURES_API_HOST=${FIXTURES_API_HOST:-}
      - FIXTURES_API_TIMEOUT_SEC=${FIXTURES_API_TIMEOUT_SEC:-15}
    volumes:
      - ./data:/app/data
      - ./web/backend/app/models/store:/app/backend/app/models/store

  frontend:
    build:
      context: .
      dockerfile: web/frontend/Dockerfile
    container_name: tfm_laliga_frontend
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      - VITE_BACKEND_ORIGIN=${VITE_BACKEND_ORIGIN:-http://localhost:8000}
    depends_on:
      - api

  etl:
    build:
      context: .
      dockerfile: modelos/etl/Dockerfile
    container_name: tfm_laliga_etl
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./modelos/etl:/app/etl
      - ./web/backend:/app/backend
    command: ["--help"]

